services:


## CADVISOR ##

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true

    ports:
      - "8081:8080"

    networks:
      - monitoring-net

    volumes:
      - /:/rootfs:ro 
      - /var/run:/var/run:ro 
      - /sys:/sys:ro 
      - /var/lib/docker/:/var/lib/docker:ro 
      - /dev/disk/:/dev/disk:ro 
      - /sys/fs/cgroup:/sys/fs/cgroup:ro

    depends_on:
      front:
        condition: service_healthy


## NGINX ##

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest

    ports:
      - 9113:9113

    networks:
      - monitoring-net
      - front-net

    command: ["--nginx.scrape-uri=http://front:80/stub_status"]

    depends_on:
      front:
        condition: service_healthy


## NODE_EXPORTER

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring-net


