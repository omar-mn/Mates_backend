name: users ci pipeline

on:
  push:
    branches:
      - dev
    paths:
      - "users/**"

jobs:
  test:
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:        ${{secrets.POSTGRES_DB}}
          POSTGRES_USER:      ${{secrets.POSTGRES_USER}}
          POSTGRES_PASSWORD:  ${{secrets.POSTGRES_PASSWORD}}
        ports:
          - 5432:5432

    runs-on: ubuntu-latest
    environment: prod
    env:
      SECRET_KEY:         ${{secrets.SECRET_KEY}}
      POSTGRES_DB:        ${{secrets.POSTGRES_DB}}
      POSTGRES_USER:      ${{secrets.POSTGRES_USER}}
      POSTGRES_PASSWORD:  ${{secrets.POSTGRES_PASSWORD}}
      # EMAIL_USER:       ${{secrets.EMAIL_USER}}
      # EMAIL_PASS:       ${{secrets.EMAIL_PASS}}

    steps:
      - name: cheackout
        uses: actions/checkout@v4.2.2

      - name: reqs install
        run:  pip install -r users/requirements.txt

      - name: env vars check
        run: |

          if [ -n "$SECRET_KEY" ]; then
            echo "SECRET_KEY exists"
          else
            echo "SECRET_KEY missing"
          fi

          if [ -n "$POSTGRES_DB" ]; then
            echo "POSTGRES_DB exists"
          else
            echo "POSTGRES_DB missing"
          fi

          if [ -n "$POSTGRES_PASSWORD" ]; then
            echo "POSTGRES_PASSWORD exists"
          else
            echo "POSTGRES_PASSWORD missing"
          fi

          if [ -n "$POSTGRES_USER" ]; then
            echo "POSTGRES_USER exists"
          else
            echo "POSTGRES_USER missing"
          fi

          if [ -n "$POSTGRES_USER" ]; then
            echo "POSTGRES_USER exists"
          else
            echo "POSTGRES_USER missing"
          fi

      - name: run tests
        run: cd users && pytest
