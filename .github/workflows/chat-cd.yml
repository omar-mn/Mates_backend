name: chat cd workflow

on:
  push:
    branches:
      - main
    paths:
      - "backend/chat/**"

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: checkout
        uses: actions/cjeckout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend/chat/.
          push: true
          tags: |
            3omar0/mates-chat:${{vars.IMAGE_VERSION}}
            3omar0/mates-chat:latest

