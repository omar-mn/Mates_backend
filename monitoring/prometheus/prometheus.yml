global:
  scrape_interval: 5s

rule_files:

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
  
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: users-service
    static_configs:
      - targets: ['users-service:8000']

  - job_name: chat-service
    static_configs:
      - targets: ['chat-service:8080']
